{% block title %}
    Post List View
{% endblock %}

{% block content %}
    <h1>All Posts</h1>
    <ul>
        {% for item in posts %}
        <li>
            <h3>Title {{ item.title }}</h3>
            <p>Body: {{ item.body|truncatechars:5 }}</p>
            <a href="{% url 'post_detail' item.id %}">Continue reading...</a>
        </li>
        {% endfor %}
    </ul>
{% endblock content %}
